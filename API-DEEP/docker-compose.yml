version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tickets
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: senha123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    image: python:3.11-slim
    working_dir: /app
    command: tail -f /dev/null
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - db
      - redis
    environment:
      DB_HOST: db
      DB_NAME: tickets
      DB_USER: admin
      DB_PASSWORD: senha123

volumes:
  postgres_data:
